name: Bridge Check

on:
  push:
    paths:
      - ".github/workflows/bridge-check.yml"
      - "coderover-bridge/**"
  pull_request:
    paths:
      - ".github/workflows/bridge-check.yml"
      - "coderover-bridge/**"

jobs:
  bridge-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install bridge dependencies
        working-directory: coderover-bridge
        run: bun install --frozen-lockfile

      - name: Run bridge tests
        working-directory: coderover-bridge
        run: bun run test

      - name: Verify bridge entrypoints load
        working-directory: coderover-bridge
        run: |
          bun -e "const mod = require('./dist'); const names = ['startBridge', 'openLastActiveThread', 'watchThreadRollout']; for (const name of names) { if (typeof mod[name] !== 'function') { throw new Error('Missing export: ' + name); } }"
